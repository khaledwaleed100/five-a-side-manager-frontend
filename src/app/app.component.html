<app-navbar></app-navbar>
<main class="min-h-screen pt-24 bg-aurora transition-colors duration-500 relative flex flex-col">
  <div class="flex-grow">
    <router-outlet></router-outlet>
  </div>
  
  <footer class="mt-auto pb-8 pt-20 px-4">
    <div class="max-w-5xl mx-auto bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-white/20 dark:border-slate-800/50 rounded-[2rem] shadow-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gray-900 dark:bg-white rounded-xl flex items-center justify-center text-white dark:text-gray-900 rotate-3">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <div>
          <span class="text-xl font-black italic tracking-tighter text-gray-900 dark:text-white">
            5-A-SIDE<span class="text-accent-light dark:text-accent-dark">MGR</span>
          </span>
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">The ultimate pitch manager</p>
        </div>
      </div>

      <div class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest order-3 md:order-2">
        &copy; 2026 Crafted by <span class="text-gray-900 dark:text-white">Khaled</span>
      </div>

      <div class="flex items-center gap-4 order-2 md:order-3">
        <!-- Install PWA Button -->
        <button *ngIf="pwaService.showInstallButton()" 
                (click)="pwaService.installPwa()"
                class="flex items-center gap-2 px-5 py-2.5 bg-accent-light dark:bg-accent-dark text-white text-[10px] font-black rounded-full shadow-lg hover:scale-105 transition-all hover:shadow-accent-light/40 dark:hover:shadow-accent-dark/40 uppercase tracking-widest active:scale-95">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          INSTALL
        </button>

        <a href="https://github.com/khaledwaleed100" target="_blank" class="w-10 h-10 rounded-full border border-gray-200 dark:border-slate-800 flex items-center justify-center text-gray-400 hover:text-gray-900 dark:hover:text-white hover:border-gray-900 dark:hover:border-white transition-all">
          <span class="sr-only">GitHub</span>
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">

    </div>
  </footer>
</main>
